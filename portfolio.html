<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資產總覽">
<meta name="theme-color" content="#0d0f18">
<title>資產總覽</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ── Reset & Tokens ─────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f18;--bg2:#141720;--bg3:#1a1e2e;--bg4:#202436;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --tx:#e4e7f0;--tx2:#7c839a;--tx3:#454c62;
  --gr:#27c27e;--rd:#e8504a;--bl:#4b8ef0;
  --pu:#8f72f2;--tl:#29c4a2;--am:#e8a020;
  --r:10px;--rsm:6px;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
html{font-size:14px;background:var(--bg)}
body{color:var(--tx);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100dvh;background:var(--bg);overscroll-behavior-y:contain}
button,input,select{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── Mobile layout ─────────────────────────── */
.mob{display:flex;flex-direction:column;min-height:100dvh;width:100%}
.dsk{display:none}

.mhdr{padding:calc(var(--st)+12px) 14px 10px;background:var(--bg2);flex-shrink:0;z-index:50;border-bottom:1px solid var(--b1);position:sticky;top:0}
.mhdr-row{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:700;letter-spacing:-.4px}
.logo em{color:var(--bl);font-style:normal}
.hdr-r{display:flex;gap:8px;align-items:center}

.cpill{display:flex;border:1px solid var(--b2);border-radius:20px;overflow:hidden;background:var(--bg)}
.cpill button{background:none;border:none;padding:5px 12px;font-size:13px;color:var(--tx2);cursor:pointer;font-weight:500}
.cpill button.on{background:var(--bl);color:#fff;font-weight:600;border-radius:20px}

.rbtn{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--b2);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--tx);cursor:pointer;white-space:nowrap;font-weight:500}
.rbtn:active{opacity:.7}
.rbtn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.mbody{flex:1;padding:14px 14px calc(80px + var(--sb));width:100%}

.mtabs{position:fixed;bottom:0;left:0;right:0;background:rgba(20,23,32,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b1);display:flex;padding-bottom:var(--sb);z-index:100}
.mtab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;gap:3px;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:600;transition:color .15s}
.mtab.on{color:var(--bl)}
.mtab svg{width:22px;height:22px}

.mpanel{display:none;width:100%}
.mpanel.on{display:block}

/* ── Desktop layout (≥768px) ───────────────── */
@media(min-width:768px){
  .mob{display:none}
  .dsk{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;min-height:100dvh}
  .dtop{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:60}
  .dtop .logo{font-size:16px}
  .dtop-r{display:flex;align-items:center;gap:14px}
  .dupd{font-size:12px;color:var(--tx2)}
  .dside{background:var(--bg2);border-right:1px solid var(--b1);padding:14px 0;position:sticky;top:56px;height:calc(100dvh - 56px);overflow-y:auto}
  .dnav{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;font-size:13px;color:var(--tx2);border-left:3px solid transparent;transition:all .15s;user-select:none}
  .dnav:hover{color:var(--tx);background:var(--bg3)}
  .dnav.on{color:var(--tx);border-left-color:var(--bl);background:var(--bg3);font-weight:600}
  .dnav svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
  .dseclbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;padding:16px 18px 6px;font-weight:700}
  .dmain{padding:24px 28px}
  .dpanel{display:none}
  .dpanel.on{display:block}
}

/* ── Shared Components ─────────────────────── */
.sbar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx2);margin-bottom:14px;padding:10px 14px;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rsm)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--tx3)}
.sdot.ok{background:var(--gr)}.sdot.ld{background:var(--am);animation:pulse 1s infinite}.sdot.er{background:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:768px){.metrics{grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}}
.mc{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px}
.mclbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:700}
.mcval{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1.1;font-variant-numeric:tabular-nums}
@media(min-width:768px){.mcval{font-size:24px}}
.mcval.g{color:var(--gr)}.mcval.r{color:var(--rd)}
.mcsub{font-size:11px;color:var(--tx2);margin-top:5px}

/* 📱 解鎖橫向滾動的核心與優化樣式 */
.tblwrap{border-radius:var(--r);border:1px solid var(--b1);overflow-x:auto;background:var(--bg3);width:100%;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
@media(max-width:767px){
  table{min-width:340px} /* 確保極窄螢幕下仍有基本滑動彈性 */
}
thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;background:var(--bg4);border-bottom:1px solid var(--b1)}
th.R,td.R{text-align:right}
tbody td{padding:12px 12px;border-bottom:1px solid var(--b1);color:var(--tx);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:active{background:rgba(255,255,255,.04)}
@media(min-width:768px){tbody tr:hover{background:rgba(255,255,255,.025)}}

.ovgrid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:18px}
@media(min-width:600px){.ovgrid{grid-template-columns:240px 1fr}}
.card{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:16px}
.cardt{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.chwrap{position:relative;height:180px}
.alrow{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--b1)}
.alrow:last-child{border-bottom:none}
.aldot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.alname{font-size:13px;flex:1;color:var(--tx)}
.alpnl{font-size:12px;font-weight:600}
.alpnl.g{color:var(--gr)}.alpnl.r{color:var(--rd)}
.alval{font-size:12px;font-weight:500;color:var(--tx);margin-left:6px}

.sec{margin-bottom:24px}
.sechdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.bCrypto{background:rgba(143,114,242,.15);color:var(--pu)}
.bUs{background:rgba(75,142,240,.15);color:var(--bl)}
.bTw{background:rgba(41,196,162,.15);color:var(--tl)}
.addbtn{background:none;border:1px solid var(--b2);border-radius:var(--rsm);padding:6px 14px;font-size:12px;color:var(--tx);cursor:pointer;transition:all .15s;font-weight:500}
.addbtn:hover{border-color:var(--bl);color:var(--bl)}

.cG{color:var(--gr);font-weight:600}.cR{color:var(--rd);font-weight:600}
.tick{font-weight:700;font-size:13px;letter-spacing:.02em}
.nsub{font-size:11px;color:var(--tx2);display:block;margin-top:2px}
.dtsub{font-size:11px;color:var(--tx2);display:block;margin-top:2px}
.pspin{width:10px;height:10px;border:1.5px solid var(--b2);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.acts{display:flex;gap:4px;justify-content:flex-end}
.ibtn{background:none;border:none;width:30px;height:30px;border-radius:6px;color:var(--tx2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.ibtn:hover{background:var(--bg4);color:var(--tx)}
.emptytd{text-align:center;color:var(--tx3);padding:32px 12px;font-size:13px}

.scard{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:18px;max-width:520px;margin-bottom:16px}
.scard h3{font-size:14px;font-weight:600;margin-bottom:4px}
.scard-sub{font-size:12px;color:var(--tx2);margin-bottom:16px;line-height:1.5}
.frow{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
@media(min-width:600px){
  .frow{flex-direction:row;align-items:center;gap:12px}
}
.flbl{font-size:13px;color:var(--tx2);width:140px;flex-shrink:0}
.finput{width:100%;background:var(--bg4);border:1px solid var(--b2);border-radius:var(--rsm);padding:10px 12px;font-size:14px;color:var(--tx);transition:border-color .15s}
.finput:focus{outline:none;border-color:var(--bl)}
.sbtn{background:var(--bl);border:none;border-radius:var(--rsm);padding:10px 22px;font-size:13px;color:#fff;font-weight:600;cursor:pointer}
.sbtn2{background:var(--bg4);color:var(--tx2);border:1px solid var(--b2);border-radius:var(--rsm);padding:10px 16px;font-size:13px;cursor:pointer}
.sbtn-danger{background:rgba(232,80,74,.12);color:var(--rd);border:1px solid rgba(232,80,74,.25);border-radius:var(--rsm);padding:10px 18px;font-size:13px;cursor:pointer;font-weight:500}

/* ── 優化行動端輸入彈窗 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;overflow-y:auto}
@media(min-width:768px){hbar{display:none}.modal-bg{align-items:center;padding:20px}}
.modal-bg.on{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:20px 20px 0 0;padding:16px 20px calc(24px + var(--sb));width:100%;max-width:460px;transform:translateY(100%);transition:transform .25s cubic-bezier(0.1, 0.76, 0.55, 0.94);max-height:92dvh;overflow-y:auto}
@media(min-width:768px){.modal{border-radius:16px;transform:scale(0.95);max-height:none}}
.modal-bg.on .modal{transform:translateY(0)}
@media(min-width:768px){.modal-bg.on .modal{transform:scale(1)}}
.hbar{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 14px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-hdr h3{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;color:var(--tx2);font-size:24px;cursor:pointer;padding:4px}
.modal-footer{display:flex;gap:10px;margin-top:20px}
.modal-footer .sbtn{flex:2}
.modal-footer .sbtn2{flex:1}

#toast{position:fixed;bottom:calc(84px + var(--sb));left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--b2);border-radius:20px;padding:10px 22px;font-size:12px;color:var(--tx);opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;box-shadow:0 6px 26px rgba(0,0,0,.5)}
@media(min-width:768px){#toast{bottom:28px}}
#toast.on{opacity:1}
</style>
</head>
<body>

<div class="mob">
  <header class="mhdr">
    <div class="mhdr-row">
      <div class="logo">資產<em>總覽</em></div>
      <div class="hdr-r">
        <div class="cpill">
          <button id="mb-twd" class="on" onclick="setCur('TWD')">TWD</button>
          <button id="mb-usd" onclick="setCur('USD')">USD</button>
        </div>
        <button class="rbtn" id="m-rbtn" onclick="fetchAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          刷新
        </button>
      </div>
    </div>
  </header>
  <div class="mbody">
    <div id="msbar" class="sbar" style="display:none"><span class="sdot" id="msdot"></span><span id="mstxt"></span></div>
    
    <div id="mp-overview" class="mpanel on">
      <div class="metrics" id="m-met"></div>
      <div class="ovgrid">
        <div class="card"><div class="cardt">資產配置</div><div class="chwrap"><canvas id="m-ch"></canvas></div></div>
        <div class="card"><div class="cardt">各類別損益</div><div id="m-al"></div></div>
      </div>
    </div>

    <div id="mp-tw" class="mpanel">
      <div class="sec">
        <div class="sechdr"><span class="badge bTw">國泰證券</span><button class="addbtn" onclick="openModal('cathay_tw')">＋ 新增</button></div>
        <div class="tblwrap"><table><thead><tr><th>股票</th><th class="R">現價</th><th class="R">損益</th><th style="width:10px"></th></tr></thead><tbody id="mt-cathay_tw"></tbody></table></div>
      </div>
      <div class="sec">
        <div class="sechdr"><span class="badge bTw">永豐金證券</span><button class="addbtn" onclick="openModal('sinopac')">＋ 新增</button></div>
        <div class="tblwrap"><table><thead><tr><th>股票</th><th class="R">現價</th><th class="R">損益</th><th style="width:10px"></th></tr></thead><tbody id="mt-sinopac"></tbody></table></div>
      </div>
    </div>

    <div id="mp-us" class="mpanel">
      <div class="sec">
        <div class="sechdr"><span class="badge bUs">國泰 複委託</span><button class="addbtn" onclick="openModal('cathay_us')">＋ 新增</button></div>
        <div class="tblwrap"><table><thead><tr><th>股票</th><th class="R">現價</th><th class="R">損益</th><th style="width:10px"></th></tr></thead><tbody id="mt-cathay_us"></tbody></table></div>
      </div>
      <div class="sec">
        <div class="sechdr"><span class="badge bUs">Firstrade</span><button class="addbtn" onclick="openModal('firstrade')">＋ 新增</button></div>
        <div class="tblwrap"><table><thead><tr><th>股票</th><th class="R">現價</th><th class="R">損益</th><th style="width:10px"></th></tr></thead><tbody id="mt-firstrade"></tbody></table></div>
      </div>
    </div>

    <div id="mp-crypto" class="mpanel">
      <div class="sec">
        <div class="sechdr"><span class="badge bCrypto">幣安 Binance</span><button class="addbtn" onclick="openModal('binance')">＋ 新增</button></div>
        <div class="tblwrap"><table><thead><tr><th>幣種</th><th class="R">現價</th><th class="R">損益</th><th style="width:10px"></th></tr></thead><tbody id="mt-binance"></tbody></table></div>
      </div>
      <div class="sec">
        <div class="sechdr"><span class="badge bCrypto">Ledger 冷錢包</span><button class="addbtn" onclick="openModal('ledger')">＋ 新增</button></div>
        <div class="tblwrap"><table><thead><tr><th>幣種</th><th class="R">現價</th><th class="R">損益</th><th style="width:10px"></th></tr></thead><tbody id="mt-ledger"></tbody></table></div>
      </div>
    </div>
    <div id="mp-settings" class="mpanel"><div id="m-set"></div></div>
  </div>
  
  <nav class="mtabs">
    <button class="mtab on" id="mtab-overview" onclick="switchTab('overview')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>總覽</button>
    <button class="mtab" id="mtab-tw" onclick="switchTab('tw')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zm11 0h7v7h-7zM3
