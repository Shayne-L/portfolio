<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資產總覽">
<meta name="theme-color" content="#0d0f18">
<title>資產總覽 v2.3 (portfolio.json 穩定版)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
/* ── 精緻黑色極簡風格 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f18;--bg2:#141720;--bg3:#1a1e2e;--bg4:#202436;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);
  --t1:#ffffff;--t2:#9ca3af;--t3:#6b7280;
  --accent:#3b82f6;--accent-bg:rgba(59,130,246,.15);
  --green:#10b981;--red:#ef4444;
}
body{background-color:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-h:100vh;padding-bottom:75px}

/* 頂部導覽 */
.hdr{position:sticky;top:0;background:rgba(13,15,24,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);padding:14px 16px;display:flex;justify-content:between;align-items:center;z-index:100}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.sync-badge{font-size:11px;padding:3px 8px;border-radius:100px;font-weight:500}
.sync-badge.off{background:rgba(239,68,68,.1);color:var(--red)}
.sync-badge.on{background:rgba(16,185,129,.1);color:var(--green)}

/* 響應式佈局 */
.container{max-width:1100px;margin:0 auto;padding:16px}
.grid-main{display:flex;flex-direction:column;gap:16px}
@media(min-width:768px){
  .grid-main{display:grid;grid-template-columns:1fr 340px;align-items:start}
}

/* 卡片基礎 */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:16px;padding:16px;margin-bottom:16px}
.card-title{font-size:14px;color:var(--t2);font-weight:600;margin-bottom:12px;display:flex;justify-content:between;align-items:center}

/* 資產數據總計 */
.total-val{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.total-sub{font-size:12px;color:var(--t3)}

/* 圓餅圖容器 */
.chart-box{position:relative;width:100%;max-width:260px;margin:12px auto;aspect-ratio:1}

/* 表單樣式 */
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:11px;color:var(--t3);font-weight:600;margin-bottom:4px;text-transform:uppercase}
.input-ctrl{width:100%;background:var(--bg3);border:1px solid var(--b1);color:var(--t1);border-radius:8px;padding:10px 12px;font-size:14px;transition:0.2s}
.input-ctrl:focus{border-color:var(--accent);outline:none}

/* 按鈕群組 */
.btn{width:100%;padding:11px;border-radius:100px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:0.2s;display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{opacity:0.8}
.btn-outline{background:transparent;border:1px solid var(--b1);color:var(--t2)}
.btn-outline:active{background:var(--b1)}
.btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}

/* 手機底部 Tab Bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(20,23,32,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--b1);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:90}
.tab-btn{background:none;border:none;color:var(--t3);font-size:10px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:25%}
.tab-btn.on{color:var(--accent)}
.tab-btn svg{width:20px;height:20px;fill:currentColor}

/* 區塊隱藏/顯示控制 */
.page-panel{display:none}
.page-panel.on{display:block}

/* 電腦端頂部選單切換 */
.pc-nav{display:none;gap:8px}
@media(min-width:768px){
  .pc-nav{display:flex}
  .tab-bar{display:none}
}
.pc-btn{background:transparent;border:none;color:var(--t2);padding:6px 12px;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer}
.pc-btn.on{background:var(--accent-bg);color:var(--accent)}

/* 資產表格項目樣式 */
.asset-item{display:flex;justify-content:between;align-items:center;padding:12px 0;border-bottom:1px solid var(--b1)}
.asset-item:last-child{border-bottom:none}
</style>
</head>
<body>

  <div class="hdr">
    <h1>資產總覽系統</h1>
    
    <div class="pc-nav">
      <button onclick="switchTab('dash')" class="pc-btn dnav-dash on">總覽</button>
      <button onclick="switchTab('edit')" class="pc-btn dnav-edit">資產編輯</button>
      <button onclick="switchTab('sync')" class="pc-btn dnav-sync">金鑰備份</button>
    </div>

    <div id="sync-badge" class="sync-badge off">本地模式</div>
  </div>

  <div class="container">
    <div class="grid-main">
      
      <div class="main-content">
        
        <div id="panel-dash" class="page-panel on">
          <div class="card">
            <div class="card-title">總資產估值 (折合新台幣)</div>
            <div id="total-val" class="total-val">$ 0</div>
            <div id="last-update-time" class="total-sub">最後更新：尚未載入資料</div>
          </div>

          <div class="card">
            <div class="card-title">資產權重分佈</div>
            <div class="chart-box">
              <canvas id="pieChart"></canvas>
            </div>
          </div>

          <div class="card">
            <div class="card-title">分類明細統計</div>
            <div id="dash-summary-list" class="space-y-1">
              </div>
          </div>
        </div>

        <div id="panel-edit" class="page-panel">
          <div class="card">
            <div class="card-title">新增 / 修改資產項目</div>
            <div class="space-y-3">
              <div class="input-group">
                <label>帳戶分類 (Category)</label>
                <select id="form-cat" class="input-ctrl">
                  <option value="cathay_tw">國泰台股 (cathay_tw)</option>
                  <option value="cathay_us">國泰美股 (cathay_us)</option>
                  <option value="sinopac">永豐證券 (sinopac)</option>
                  <option value="firstrade">第一證券 (firstrade)</option>
                  <option value="ledger">Ledger 錢包 (ledger)</option>
                  <option value="binance">幣安交易所 (binance)</option>
                </select>
              </div>
              <div class="input-group">
                <label>代號 / 幣種 (Symbol)</label>
                <input type="text" id="form-sym" placeholder="例如: 00923, NVDA, BTC" class="input-ctrl">
              </div>
              <div class="input-group">
                <label>持有數量 (Quantity)</label>
                <input type="number" id="form-qty" step="any" placeholder="請輸入持股或持幣量" class="input-ctrl">
              </div>
              <div class="input-group">
                <label>平均買入成本 (Cost)</label>
                <input type="number" id="form-cost" step="any" placeholder="買入成本價" class="input-ctrl">
              </div>
              <button type="button" onclick="addAssetItem()" class="btn btn-primary" style="border-radius:8px;">
                保存此資產項目至手機
              </button>
            </div>
          </div>

          <div class="card">
            <div class="card-title">當前本地資產清單</div>
            <div id="edit-assets-list">
              </div>
          </div>
        </div>

        <div id="panel-sync" class="page-panel">
          <div class="card">
            <div class="card-title">🔒 GitHub Gist 雲端安全密鑰</div>
            <p style="font-size:12px; color:var(--t3); margin-bottom:12px; line-height:1.4;">
              金鑰已在手機中安全隔離，切換分頁絕不丟失。系統已對接 Gist 的 <strong>portfolio.json</strong> 存檔。
            </p>
            <div class="space-y-3">
              <div class="input-group">
                <label>GitHub Personal Token</label>
                <input type="password" id="cfg-token" placeholder="ghp_xxxxxxxxxxxx" class="input-ctrl">
              </div>
              <div class="input-group">
                <label>Gist ID</label>
                <input type="text" id="cfg-gid" placeholder="填入儲存 portfolio.json 的 Gist ID" class="input-ctrl">
              </div>
              <button type="button" onclick="saveConfigKeys()" class="btn btn-primary" style="border-radius:8px;">
                🔒 儲存金鑰（不連網）
              </button>
            </div>
          </div>

          <div class="card">
            <div class="card-title">🔄 數據單向手動傳輸分流</div>
            <p style="font-size:12px; color:var(--t3); margin-bottom:14px; line-height:1.4;">
              針對 <strong>portfolio.json</strong> 執行的手動分流同步動作：
            </p>
            
            <button type="button" onclick="pullCloudGist()" class="btn btn-outline" style="border-color:var(--green); color:var(--green); padding:14px; border-radius:12px;">
              ⬇️ 從雲端下載並覆蓋此裝置 (portfolio.json)
            </button>

            <button type="button" onclick="pushCloudGist()" class="btn btn-outline" style="border-color:var(--accent); color:var(--accent); padding:14px; border-radius:12px; margin-top:8px;">
              ⬆️ 將此裝置資產備份至雲端 (portfolio.json)
            </button>
          </div>

          <button type="button" onclick="purgeLocalCache()" class="btn btn-danger">
            ⚠️ 徹底清除本地快取資料
          </button>
        </div>

      </div>

    </div>
  </div>

  <div class="tab-bar">
    <button onclick="switchTab('dash')" class="tab-btn mtab-dash on">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L11 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      <span>總覽</span>
    </button>
    <button onclick="switchTab('edit')" class="tab-btn mtab-edit">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      <span>編輯</span>
    </button>
    <button onclick="switchTab('sync')" class="tab-btn mtab-sync">
      <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3z"/></svg>
      <span>同步</span>
    </button>
  </div>

  <script>
  // 核心常數定義
  const CATS = ['tw', 'us', 'crypto', 'cathay_tw', 'cathay_us', 'binance', 'sinopac', 'firstrade', 'ledger'];
  const TABS = ['dash', 'edit', 'sync'];
  
  // 記憶體全域狀態
  let H = {};
  let C = { TOKEN: '', GID: '' };
  let myChart = null;

  window.addEventListener('DOMContentLoaded', () => {
    initLocalHoldings();
    loadConfigKeys();
    refreshUI();
  });

  // 1. 初始化資料夾結構
  function initLocalHoldings() {
    try {
      let raw = localStorage.getItem('p_holdings');
      H = raw ? JSON.parse(raw) : {};
    } catch(e) {
      H = {};
    }
    CATS.forEach(k => { if (!H[k]) H[k] = []; });
    if (!H.lastUpdate) H.lastUpdate = Date.now();
    saveToLocalStorage();
  }

  function saveToLocalStorage() {
    localStorage.setItem('p_holdings', JSON.stringify(H));
  }

  // 2. 載入金鑰與狀態
  function loadConfigKeys() {
    C.TOKEN = localStorage.getItem('gist_token') || '';
    C.GID = localStorage.getItem('gist_id') || '';

    document.getElementById('cfg-token').value = C.TOKEN;
    document.getElementById('cfg-gid').value = C.GID;

    const badge = document.getElementById('sync-badge');
    if (C.TOKEN && C.GID) {
      badge.className = "sync-badge on";
      badge.innerText = "雲端同步就緒";
    } else {
      badge.className = "sync-badge off";
      badge.innerText = "本地模式";
    }
  }

  // 🔒 儲存金鑰（不連網）
  function saveConfigKeys() {
    const tk = document.getElementById('cfg-token').value.trim();
    const gid = document.getElementById('cfg-gid').value.trim();

    if (!tk || !gid) {
      alert("❌ 請輸入完整的 Token 與 Gist ID 再執行儲存！");
      return;
    }

    localStorage.setItem('gist_token', tk);
    localStorage.setItem('gist_id', gid);
    
    loadConfigKeys();
    alert("✨ 金鑰已成功綁定！系統已切換至對接 portfolio.json 目錄。");
  }

  // 3. ⬇️ 雲端拉取至本地（全面修正至 portfolio.json 檔案）
  async function pullCloudGist() {
    loadConfigKeys();
    if (!C.TOKEN || !C.GID) {
      alert("❌ 下載失敗！請先輸入金鑰並儲存後再點擊下載！");
      return;
    }

    if (!confirm("確定要執行【下載】嗎？這會用雲端的 portfolio.json 覆蓋這台手機目前的資料！")) return;

    try {
      const res = await fetch(`https://api.github.com/gists/${C.GID}`, {
        method: 'GET',
        headers: { 
          'Authorization': `token ${C.TOKEN}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });

      if (!res.ok) throw new Error(`HTTP 錯誤！狀態碼: ${res.status}`);

      const data = await res.json();
      // 關鍵異動：改為檢查並載入 portfolio.json
      if (data.files && data.files['portfolio.json']) {
        const cloudData = JSON.parse(data.files['portfolio.json'].content);
        
        H = cloudData;
        saveToLocalStorage();
        refreshUI();
        
        alert("🎉 同步成功！已成功從雲端 portfolio.json 載入所有資產明細！");
        switchTab('dash');
      } else {
        alert("❌ 雲端 Gist 中找不到名為 'portfolio.json' 的資產檔案，請確認您的 Gist 檔案命名是否正確！");
      }
    } catch (err) {
      alert(`❌ 讀取雲端失敗！請檢查金鑰密碼、Gist ID 是否正確。\n訊息: ${err.message}`);
    }
  }

  // 4. ⬆️ 本地上推至雲端（全面修正至 portfolio.json 檔案）
  async function pushCloudGist() {
    loadConfigKeys();
    if (!C.TOKEN || !C.GID) {
      alert("❌ 請先填寫並儲存金鑰再執行備份！");
      return;
    }

    // 空值強效攔截防呆
    let hasLocalData = CATS.some(k => H[k] && H[k].length > 0);
    if (!hasLocalData) {
      if (!confirm("⚠️ 核心危險警告！您目前此台手機的資產紀錄是「完全空白」的！\n\n如果繼續，將會把雲端的 portfolio.json 存檔也洗成完全空白！您確定真的要覆蓋嗎？")) {
        return;
      }
    } else {
      if (!confirm("確定要把當前手機的資產數據上傳，並覆蓋雲端的 portfolio.json 檔案嗎？")) return;
    }

    try {
      H.lastUpdate = Date.now();
      saveToLocalStorage();

      const res = await fetch(`https://api.github.com/gists/${C.GID}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `token ${C.TOKEN}`,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github.v3+json'
        },
        body: JSON.stringify({
          files: {
            // 關鍵異動：指定覆蓋更新至 portfolio.json
            'portfolio.json': {
              content: JSON.stringify(H, null, 2)
            }
          }
        })
      });

      if (!res.ok) throw new Error(`PATCH 失敗，狀態碼: ${res.status}`);

      alert("🚀 備份成功！數據已成功推送到雲端 portfolio.json 中妥善儲存。");
    } catch (err) {
      alert(`❌ 備份失敗：${err.message}`);
    }
  }

  // 5. 新增資產項目
  function addAssetItem() {
    const cat = document.getElementById('form-cat').value;
    const sym = document.getElementById('form-sym').value.trim().toUpperCase();
    const qty = parseFloat(document.getElementById('form-qty').value);
    const cost = parseFloat(document.getElementById('form-cost').value);

    if (!sym || isNaN(qty) || isNaN(cost)) {
      alert("❌ 請完整填寫代號、數量與成本！");
      return;
    }

    const idx = H[cat].findIndex(item => item.sym === sym);
    const payload = { sym, qty, cost, date: new Date().toISOString().split('T')[0] };
    
    if (idx > -1) {
      H[cat][idx] = payload;
    } else {
      H[cat].push(payload);
    }

    H.lastUpdate = Date.now();
    saveToLocalStorage();
    refreshUI();
    
    document.getElementById('form-sym').value = '';
    document.getElementById('form-qty').value = '';
    document.getElementById('form-cost').value = '';
    
    alert(`已儲存項目 [${sym}] 至手機快取。請記得至同步頁面點選備份上傳！`);
  }

  // 刪除個別資產
  function deleteAssetItem(cat, sym) {
    if (!confirm(`確定要刪除 ${cat} 分類中的 ${sym} 嗎？`)) return;
    H[cat] = H[cat].filter(i => i.sym !== sym);
    H.lastUpdate = Date.now();
    saveToLocalStorage();
    refreshUI();
  }

  // 6. UI 渲染與圖表繪製
  function refreshUI() {
    let totalItems = 0;
    let summaryHtml = '';
    let editListHtml = '';
    
    let chartLabels = [];
    let chartData = [];

    CATS.forEach(cat => {
      const list = H[cat] || [];
      const count = list.length;
      totalItems += count;

      if (count > 0) {
        summaryHtml += `
          <div class="asset-item">
            <span style="color:var(--t2); font-size:13px; font-weight:500;">${cat}</span>
            <span style="font-weight:700; font-size:14px; color:var(--accent);">${count} 筆項目</span>
          </div>`;

        chartLabels.push(cat);
        chartData.push(count);

        editListHtml += `<div style="margin-top:10px; margin-bottom:6px; font-size:12px; color:var(--accent); font-weight:700;">📂 ${cat}</div>`;
        list.forEach(item => {
          editListHtml += `
            <div class="asset-item" style="padding-left:8px; border-bottom:1px solid rgba(255,255,255,0.03);">
              <div>
                <span style="font-weight:700;">${item.sym}</span>
                <span style="font-size:11px; color:var(--t3); margin-left:6px;">量: ${item.qty} / 本: ${item.cost}</span>
              </div>
              <button type="button" onclick="deleteAssetItem('${cat}','${item.sym}')" style="background:none; border:none; color:var(--red); font-size:12px; cursor:pointer;">
                刪除
              </button>
            </div>`;
        });
      }
    });

    document.getElementById('dash-summary-list').innerHTML = summaryHtml || '<p style="color:var(--red); font-size:13px;">⚠️ 目前手機本地無任何資產，請盡速前往【金鑰同步】頁面下載雲端備份！</p>';
    document.getElementById('edit-assets-list').innerHTML = editListHtml || '<p style="color:var(--t3); font-size:12px;">無資產資料</p>';
    document.getElementById('total-val').innerText = totalItems > 0 ? `${totalItems} 筆資產項目` : '$ 0';
    
    if (H.lastUpdate) {
      document.getElementById('last-update-time').innerText = `最後變更：${new Date(H.lastUpdate).toLocaleString()}`;
    }

    renderChart(chartLabels, chartData);
  }

  function renderChart(labels, data) {
    const ctx = document.getElementById('pieChart').getContext('2d');
    if (myChart) myChart.destroy();
    if (labels.length === 0) return;

    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: [
            '#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', 
            '#06b6d4', '#f43f5e', '#14b8a6', '#10b981'
          ],
          borderWidth: 0
        }]
      },
      options: {
        plugins: {
          legend: { display: false },
          datalabels: { color: '#fff', font: { weight: 'bold', size: 11 } }
        },
        cutout: '65%',
        responsive: true,
        maintainAspectRatio: false
      },
      plugins: [ChartDataLabels]
    });
  }

  // 導覽切換
  function switchTab(tabName) {
    TABS.forEach(t => {
      const panel = document.getElementById(`panel-${t}`);
      if (panel) panel.classList.toggle('on', t === tabName);

      const mbtn = document.querySelector(`.mtab-${t}`);
      if (mbtn) mbtn.classList.toggle('on', t === tabName);

      const dbtn = document.querySelector(`.dnav-${t}`);
      if (dbtn) dbtn.classList.toggle('on', t === tabName);
    });

    if (tabName === 'dash') {
      refreshUI();
    } else {
      loadConfigKeys();
    }
  }

  // 徹底清除本地快取
  function purgeLocalCache() {
    if (confirm("⚠️ 確定要清除這台手機上的本地快取數據與金鑰嗎？（這不會影響您的 GitHub Gist 雲端儲存）")) {
      localStorage.clear();
      H = {};
      initLocalHoldings();
      loadConfigKeys();
      refreshUI();
      alert("本地快取已徹底清空。");
    }
  }
  </script>
</body>
</html>
