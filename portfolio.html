<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資產總覽">
<meta name="theme-color" content="#0d0f18">
<title>資產總覽</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
/* ── 延續您原本的 CSS 樣式，此處省略以節省篇幅，請保留您原本完整的 CSS 區塊 ────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f18;--bg2:#141720;--bg3:#1a1e2e;--bg4:#202436;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--tx:#e4e7f0;--tx2:#7c839a;--tx3:#454c62;--gr:#27c27e;--rd:#e8504a;--bl:#4b8ef0;--pu:#8f72f2;--tl:#29c4a2;--am:#e8a020;--r:10px;--rsm:6px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
html{font-size:14px;background:var(--bg)} body{color:var(--tx);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100dvh;background:var(--bg)}
/* (請務必保留您原檔案中完整的 <style>...</style> 內容) */
</style>
</head>
<body>
<script>
// 註冊 ChartJS 標籤插件
Chart.register(ChartDataLabels);

var TABS=['overview','tw','us','crypto','settings'];
var CATS=['cathay_tw','sinopac','cathay_us','firstrade','binance','ledger'];
var H={tw:[],us:[],crypto:[],lastUpdate:0}; 
var LP={}; var NM={}; 
var C={TOKEN:'',GID:'',FKEY:'',FX:32.5,CUR:'TWD'};
var chartObj=null;

// 移除 PROXY，直接使用原生 fetch
function getHeaders() {
    return {
        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
        'Accept': 'application/json'
    };
}

async function fetchRetry(url, opts = {}, retries = 3, delay = 500) {
    opts.headers = { ...getHeaders(), ...opts.headers };
    try {
        var res = await fetch(url, opts);
        if (!res.ok) throw new Error('Status: ' + res.status);
        return res;
    } catch (e) {
        if (retries <= 1) throw e;
        await new Promise(r => setTimeout(r, delay));
        return fetchRetry(url, opts, retries - 1, delay * 2);
    }
}

async function fetchAll() {
    var btns = [document.getElementById('m-rbtn'), document.getElementById('d-rbtn')];
    btns.forEach(b => b && b.classList.add('spin'));
    updateStatus('ld', '正在更新市場報價...');
    
    try {
        await Promise.allSettled([fetchTwStocks(), fetchUsStocks(), fetchCrypto(), fetchFx()]);
        H.lastUpdate = Date.now(); saveConfig();
        updateStatus('ok', '更新成功 (' + new Date().toLocaleTimeString() + ')');
    } catch (e) {
        updateStatus('er', '部分 API 連線受阻');
    } finally {
        btns.forEach(b => b && b.classList.remove('spin'));
        renderAll();
    }
}

async function fetchTwStocks() {
    // 改為直接抓取官方 OpenData，不需要 CORS Proxy
    const urls = [
        'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL',
        'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes'
    ];
    for (let url of urls) {
        try {
            let res = await fetchRetry(url, { signal: AbortSignal.timeout(10000) });
            let arr = await res.json();
            if (Array.isArray(arr)) {
                arr.forEach(item => {
                    let code = (item.Code || item.code || item.StockCode || '').trim();
                    let price = parseFloat(item.ClosingPrice || item.closingPrice || item.ClosePrice || 0);
                    let name = (item.Name || item.name || item.StockName || '').trim();
                    if (price > 0) { LP['s:' + code] = price; if(name) NM[code] = name; }
                });
            }
        } catch(e) {}
    }
}

async function fetchUsStocks() {
    // Yahoo Finance 改為直接呼叫，並附帶正確 User-Agent
    let symbols = [];
    ['cathay_us','firstrade'].forEach(k => (H[k]||[]).forEach(r => r.sym && symbols.push(r.sym.trim().toUpperCase())));
    if(!symbols.length) return;
    
    try {
        let url = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + [...new Set(symbols)].join(',');
        let res = await fetchRetry(url);
        let data = await res.json();
        data.quoteResponse.result.forEach(r => {
            if(r.regularMarketPrice > 0) {
                LP['s:' + r.symbol.toUpperCase()] = r.regularMarketPrice;
                NM[r.symbol.toUpperCase()] = r.longName || r.shortName || '';
            }
        });
    } catch(e) {}
}

async function fetchCrypto() {
    // Binance 直接呼叫 API
    try {
        let res = await fetchRetry('https://api.binance.com/api/v3/ticker/price');
        let arr = await res.json();
        arr.forEach(item => {
            if(item.symbol.endsWith('USDT')) {
                let coin = item.symbol.replace('USDT','');
                LP['c:' + coin] = parseFloat(item.price);
            }
        });
    } catch(e) {}
}

async function fetchFx() {
    try {
        let res = await fetchRetry('https://api.exchangerate-api.com/v4/latest/USD');
        let data = await res.json();
        if(data.rates.TWD) { C.FX = data.rates.TWD; saveConfig(); }
    } catch(e) {}
}

/* (其餘 renderAll, saveConfig, gistPull 等函數保留您原檔案的邏輯即可) */
// ... 保持您原檔案的尾部邏輯 ...
window.onload=init;
</script>
</body>
</html>
