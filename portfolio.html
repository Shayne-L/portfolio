<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資產總覽">
<meta name="theme-color" content="#0d0f18">
<title>資產總覽</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f18;--bg2:#141720;--bg3:#1a1e2e;--bg4:#202436;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --tx:#e4e7f0;--tx2:#7c839a;--tx3:#454c62;
  --gr:#27c27e;--rd:#e8504a;--bl:#4b8bf4;
  --ff:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--ff);line-height:1.5;padding-bottom:75px}
.nav{display:flex;background:var(--bg2);padding:12px;position:sticky;top:0;z-index:99;border-bottom:1px solid var(--b1);overflow-x:auto}
.nav button{background:none;border:none;color:var(--tx2);padding:8px 16px;font-size:15px;font-weight:600;cursor:pointer;border-radius:6px;white-space:nowrap;transition:0.2s}
.nav button.on{color:var(--tx);background:var(--b1)}
.container{padding:16px;max-width:1200px;margin:0 auto}
.card{background:var(--bg2);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--b1)}
.total-val{font-size:32px;font-weight:700;margin:8px 0;color:var(--tx)}
.sub-val{font-size:14px;color:var(--tx2);display:flex;gap:12px}
.sub-val span.gr{color:var(--gr)}
.sub-val span.rd{color:var(--rd)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:16px}
.mini-card{background:var(--bg2);border-radius:12px;padding:16px;border:1px solid var(--b1);position:relative}
.mini-card h4{font-size:14px;color:var(--tx2);margin-bottom:6px;font-weight:500}
.mini-card .val{font-size:20px;font-weight:700}
.chart-box{height:260px;position:relative;margin:16px 0;display:flex;justify-content:center}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
th{color:var(--tx2);text-align:left;padding:10px 8px;font-weight:500;border-bottom:1px solid var(--b1)}
td{padding:12px 8px;border-bottom:1px solid var(--b1);vertical-align:middle}
.sym-title{font-weight:600;color:var(--tx)}
.sym-name{font-size:12px;color:var(--tx2)}
.text-right{text-align:right}
.badge{padding:2px 6px;border-radius:4px;font-size:12px;font-weight:600;display:inline-block}
.badge.gr{background:rgba(39,194,126,.15);color:var(--gr)}
.badge.rd{background:rgba(232,80,74,.15);color:var(--rd)}
.btn-group{display:flex;gap:6px;justify-content:flex-end}
.btn{background:var(--bg4);border:none;color:var(--tx);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:0.2s}
.btn:hover{background:var(--b2)}
.btn.primary{background:var(--bl);color:#fff}
.btn.danger{background:rgba(232,80,74,.15);color:var(--rd)}
.btn.sm{padding:4px 8px;font-size:12px}
.p-panel{display:none}.p-panel.on{display:block}
.form-gp{margin-bottom:14px}
.form-gp label{display:block;font-size:13px;color:var(--tx2);margin-bottom:6px}
.form-gp input,.form-gp select{width:100%;background:var(--bg3);border:1px solid var(--b1);border-radius:6px;padding:10px;color:var(--tx);font-size:14px;outline:none}
.form-gp input:focus{border-color:var(--bl)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;padding:16px}
.modal.on{display:flex}
.modal-content{background:var(--bg2);border-radius:12px;width:100%;max-width:440px;padding:20px;border:1px solid var(--b1);position:relative}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-head h3{font-size:18px;font-weight:600}
.close-btn{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer}
.sync-bar{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);padding:8px 12px;border-radius:6px;font-size:12px;color:var(--tx2);margin-bottom:12px}
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:var(--bg2);border-top:1px solid var(--b1);display:flex;justify-content:space-around;padding:10px 0;z-index:98}
.bottom-bar button{background:none;border:none;color:var(--tx2);font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;width:25%}
.bottom-bar button.on{color:var(--bl)}
@media(max-width:600px){
  th:nth-child(2),td:nth-child(2),th:nth-child(5),td:nth-child(5){display:none}
  .total-val{font-size:26px}
}
</style>
</head>
<body>

<div class="nav" id="topNav">
  <button id="mtab-dashboard" class="on" onclick="switchTab('dashboard')">資產總覽</button>
  <button id="mtab-tw" onclick="switchTab('tw')">台灣股市</button>
  <button id="mtab-us" onclick="switchTab('us')">美國股市</button>
  <button id="mtab-crypto" onclick="switchTab('crypto')">虛擬貨幣</button>
  <button id="mtab-settings" onclick="switchTab('settings')">系統設定</button>
</div>

<div class="container">
  <div class="sync-bar" id="syncStatus">
    <span id="syncText">狀態：本地模式</span>
    <button class="btn sm" onclick="refreshData()">手動刷新價格</button>
  </div>

  <div id="mp-dashboard" class="p-panel on">
    <div class="card">
      <h4>總資產估值 (TWD)</h4>
      <div class="total-val" id="all-total">NT$ 0</div>
      <div class="sub-val">
        <span>成本: <span id="all-cost">NT$ 0</span></span>
        <span>回報率: <span id="all-roi">0.00%</span></span>
      </div>
    </div>
    <div class="grid">
      <div class="mini-card" style="border-left:4px solid #ea4335">
        <h4>台股資產</h4>
        <div class="val" id="tw-total">NT$ 0</div>
      </div>
      <div class="mini-card" style="border-left:4px solid #4b8bf4">
        <h4>美股資產</h4>
        <div class="val" id="us-total">NT$ 0</div>
      </div>
      <div class="mini-card" style="border-left:4px solid #fbbc05">
        <h4>虛擬貨幣</h4>
        <div class="val" id="crypto-total">NT$ 0</div>
      </div>
    </div>
    <div class="card">
      <h4>資產配置比例</h4>
      <div class="chart-box">
        <canvas id="pieChart"></canvas>
      </div>
    </div>
  </div>

  <div id="mp-tw" class="p-panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3>台股持倉清單</h3>
        <button class="btn primary sm" onclick="openAddModal('tw')">+ 新增持倉</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>代號/名稱</th><th>數量</th><th>現價</th><th>市值 (TWD)</th><th>損益</th><th>操作</th></tr>
          </thead>
          <tbody id="table-tw"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="mp-us" class="p-panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3>美股持倉清單 (匯率折算)</h3>
        <button class="btn primary sm" onclick="openAddModal('us')">+ 新增持倉</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>代號/名稱</th><th>數量</th><th>現價 (USD)</th><th>市值 (TWD)</th><th>損益</th><th>操作</th></tr>
          </thead>
          <tbody id="table-us"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="mp-crypto" class="p-panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3>虛擬貨幣持倉清單 (匯率折算)</h3>
        <button class="btn primary sm" onclick="openAddModal('crypto')">+ 新增持倉</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>代號/名稱</th><th>數量</th><th>現價 (USD)</th><th>市值 (TWD)</th><th>損益</th><th>操作</th></tr>
          </thead>
          <tbody id="table-crypto"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="mp-settings" class="p-panel">
    <div class="card">
      <h3>雲端備份與 API 設定</h3>
      <div style="margin-top:15px">
        <div class="form-gp">
          <label>GitHub Token (ghp_... 或 github_pat_...)</label>
          <input type="password" id="cfg-token" placeholder="貼上具有 gist 權限的 Personal Access Token">
        </div>
        <div class="form-gp">
          <label>GitHub Gist ID</label>
          <input type="text" id="cfg-gid" placeholder="請貼上你的 32 位元 Gist ID">
        </div>
        <div class="form-gp">
          <label>Finnhub API Key (美股資料源)</label>
          <input type="password" id="cfg-fkey" placeholder="貼上你的 Finnhub 免費版 Key">
        </div>
        <div class="form-gp">
          <label>自訂美金兌台幣匯率 (USD/TWD)</label>
          <input type="number" id="cfg-fx" value="32.5" step="0.1">
        </div>
        <button class="btn primary" style="width:100%;padding:12px" onclick="saveSettings()">儲存並完全同步設定</button>
      </div>
    </div>
    <div class="card" style="border-color:rgba(232,80,74,.3)">
      <h3 style="color:var(--rd)">危險區域</h3>
      <p style="font-size:12px;color:var(--tx2);margin:8px 0">清除所有本地與雲端緩存，將重設所有資料表。</p>
      <button class="btn danger sm" onclick="clearAllData()">重置所有持倉資料</button>
    </div>
  </div>
</div>

<div class="modal" id="addModal">
  <div class="modal-content">
    <div class="modal-head">
      <h3 id="modalTitle">新增持倉資產</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <input type="hidden" id="form-cat">
    <input type="hidden" id="form-idx">
    <div class="form-gp">
      <label id="lbl-sym">資產代號</label>
      <input type="text" id="form-sym" placeholder="請輸入代號">
    </div>
    <div class="form-gp">
      <label>備註名稱 (可選)</label>
      <input type="text" id="form-nm" placeholder="例如: 台積電 / 核心倉位">
    </div>
    <div class="form-gp">
      <label>持倉數量 (股數 / 顆數)</label>
      <input type="number" id="form-qty" step="any" placeholder="0.00">
    </div>
    <div class="form-gp">
      <label>平均買入成本</label>
      <input type="number" id="form-cost" step="any" placeholder="0.00">
    </div>
    <div class="form-gp">
      <label>交易日期</label>
      <input type="date" id="form-dt">
    </div>
    <div class="btn-group" style="margin-top:20px">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="submitForm()">確認儲存</button>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button id="dnav-dashboard" class="on" onclick="switchTab('dashboard')">📊 總覽</button>
  <button id="dnav-tw" onclick="switchTab('tw')">🇹🇼 台股</button>
  <button id="dnav-us" onclick="switchTab('us')">🇺🇸 美股</button>
  <button id="dnav-crypto" onclick="switchTab('crypto')">🪙 幣圈</button>
</div>

<script>
var TABS = ['dashboard','tw','us','crypto','settings'];
var H = { tw: [], us: [], crypto: [], lastUpdate: 0 };
var LP = {}; 
var chartInstance = null;
var C = { TOKEN: '', GID: '', FKEY: '', FX: 32.5 };

window.addEventListener('DOMContentLoaded', function() {
  loadConfig();
  renderAll(); 
  
  setTimeout(async function() {
    if (C.TOKEN && C.GID) {
      await gistPull(true);
    }
    await refreshData();
  }, 100);
});

function loadConfig() {
  C.TOKEN = localStorage.getItem('p_token') || '';
  C.GID = localStorage.getItem('p_gid') || '';
  C.FKEY = localStorage.getItem('p_fkey') || '';
  C.FX = parseFloat(localStorage.getItem('p_fx')) || 32.5;
  
  var localData = localStorage.getItem('p_holdings');
  if(localData) {
    try { H = JSON.parse(localData); } catch(e) { console.error(e); }
  }
}

function saveConfig() {
  localStorage.setItem('p_token', C.TOKEN);
  localStorage.setItem('p_gid', C.GID);
  localStorage.setItem('p_fkey', C.FKEY);
  localStorage.setItem('p_fx', C.FX.toString());
  localStorage.setItem('p_holdings', JSON.stringify(H));
}

// 基礎 Fetch 重試輔助函式（已移除了所有的 Cache-Control 請求頭，改用時間戳記避免預檢錯誤）
async function fetchRetry(url, options, retries, delay) {
  options = options || {};
  try {
    var tsUrl = url + (url.indexOf('?') !== -1 ? '&' : '?') + '_ts=' + Date.now();
    var res = await fetch(tsUrl, options);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res;
  } catch (e) {
    if (retries <= 1) throw e;
    await new Promise(function(r) { setTimeout(r, delay); });
    return fetchRetry(url, options, retries - 1, delay);
  }
}

// ── TW Stocks: 鉅亨網 Anue API 整合（完美支援 2330, 2646, 00923 並跨越網域限制） ──
async function fetchTwStocks(){
  var twSet = {};
  if (!H.tw) H.tw = [];
  H.tw.forEach(function(r){
    if(!r.sym) return;
    var code = r.sym.toString().trim().toUpperCase().replace(/\.(TW|TWO)$/i,'');
    if(code) twSet[code] = true;
  });
  var codes = Object.keys(twSet);
  if(!codes.length) return;

  try {
    var url = 'https://api.cnyes.com/media/api/v1/stock/profile?code=' + codes.join(',');
    var res = await fetchRetry(url, { signal: AbortSignal.timeout(10000) }, 3, 500);
    var json = await res.json();
    
    if (json && json.data) {
      var dataArr = Array.isArray(json.data) ? json.data : [json.data];
      dataArr.forEach(function(item) {
        if (item.code && item.price !== undefined) {
          var price = parseFloat(item.price);
          if (!isNaN(price)) {
            LP['tw:' + item.code] = price;
            LP['tw:' + item.code + '.TW'] = price;
            LP['tw:' + item.code + '.TWO'] = price;
          }
        }
      });
    }
  } catch (e) {
    console.error("台股資料獲取異常:", e);
  }
}

// ── Crypto: Coinbase API ──
async function fetchCryptoWithRetry(sym) {
  var url = 'https://api.coinbase.com/v2/prices/' + sym.toUpperCase() + '-USD/spot';
  try {
    var res = await fetchRetry(url, { signal: AbortSignal.timeout(10000) }, 2, 400);
    var json = await res.json();
    return json && json.data && json.data.amount ? parseFloat(json.data.amount) : null;
  } catch (e) { return null; }
}

async function fetchAllCryptos() {
  var cryptoSet = {};
  if (!H.crypto) H.crypto = [];
  H.crypto.forEach(function(r){
    if(r.sym) cryptoSet[r.sym.toUpperCase().trim()] = true;
  });
  var codes = Object.keys(cryptoSet);
  if(!codes.length) return;

  var promises = codes.map(async function(tk) {
    var price = await fetchCryptoWithRetry(tk);
    if(price !== null) LP['crypto:' + tk] = price;
  });
  await Promise.allSettled(promises);
}

// ── US Stocks: Finnhub API ──
async function fetchUSStocks() {
  var usSet = {};
  if (!H.us) H.us = [];
  H.us.forEach(function(r){
    if(r.sym) usSet[r.sym.toUpperCase().trim()] = true;
  });
  var codes = Object.keys(usSet);
  if(!codes.length || !C.FKEY) return;

  var promises = codes.map(async function(tk) {
    try {
      var url = 'https://finnhub.io/api/v1/quote?symbol=' + tk + '&token=' + C.FKEY;
      var res = await fetchRetry(url, { signal: AbortSignal.timeout(10000) }, 2, 400);
      var json = await res.json();
      if(json && json.c) LP['us:' + tk] = parseFloat(json.c);
    } catch(e) {}
  });
  await Promise.allSettled(promises);
}

// 行情更新主入口
async function refreshData() {
  updateSyncStatus("正在更新即時行情...");
  await Promise.allSettled([fetchTwStocks(), fetchUSStocks(), fetchAllCryptos()]);
  H.lastUpdate = Date.now();
  saveConfig();
  renderAll();
  updateSyncStatus(C.GID ? "雲端同步就緒" : "本地模式");
}

// ── GitHub Gist 核心同步組件（已完全移除了 Cache-Control Headers 解決預檢阻擋問題） ──
async function gistPull(isInitial) {
  if(!C.TOKEN || !C.GID) return;
  try {
    var url = 'https://api.github.com/gists/' + C.GID + '?_ts=' + Date.now();
    var res = await fetch(url, {
      method: 'GET',
      headers: { 'Authorization': 'token ' + C.TOKEN }
    });
    if(!res.ok) throw new Error("Gist 拉取失敗");
    var json = await res.json();
    if(json.files && json.files["portfolio.json"]) {
      var cloudData = JSON.parse(json.files["portfolio.json"].content);
      if(isInitial || !H.lastUpdate || (cloudData.lastUpdate && cloudData.lastUpdate > H.lastUpdate)) {
        H = cloudData;
        saveConfig();
        if(!isInitial) renderAll();
      }
    }
  } catch(e) {
    console.error("Gist 資料拉取失敗:", e);
  }
}

async function gistPush() {
  if(!C.TOKEN || !C.GID) return;
  try {
    H.lastUpdate = Date.now();
    saveConfig();

    var bodyData = {
      description: "Portfolio Crypto and Stocks Data",
      files: { "portfolio.json": { content: JSON.stringify(H) } }
    };

    var url = 'https://api.github.com/gists/' + C.GID;
    await fetch(url, {
      method: 'PATCH',
      headers: { 
        'Authorization': 'token ' + C.TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(bodyData)
    });
    updateSyncStatus("雲端資料同步成功");
  } catch(e) {
    updateSyncStatus("雲端同步失敗");
  }
}

// ── 畫面渲染引擎 ──
function renderAll() {
  var t_tw_cost = 0, t_tw_val = 0;
  var t_us_cost = 0, t_us_val = 0;
  var t_cp_cost = 0, t_cp_val = 0;

  if(!H.tw) H.tw = [];
  if(!H.us) H.us = [];
  if(!H.crypto) H.crypto = [];

  // 1. 台股
  var htmlTw = '';
  H.tw.forEach(function(item, idx) {
    var cleanSym = item.sym.toString().trim().toUpperCase().replace(/\.(TW|TWO)$/i,'');
    var price = LP['tw:' + cleanSym] || 0;
    var cost = parseFloat(item.cost) || 0;
    var qty = parseFloat(item.qty) || 0;
    var value = qty * price;
    var itemCost = qty * cost;
    var profit = value - itemCost;
    var roi = itemCost ? (profit / itemCost * 100) : 0;

    t_tw_cost += itemCost;
    t_tw_val += value;

    htmlTw += `<tr>
      <td><div class="sym-title">${cleanSym}</div><div class="sym-name">${item.nm || '-'}</div></td>
      <td>${qty}</td>
      <td>${price ? 'NT$ ' + price.toFixed(2) : '<span style="color:var(--tx3)">讀取中...</span>'}</td>
      <td class="text-right">NT$ ${Math.round(value).toLocaleString()}</td>
      <td class="text-right ${profit>=0?'gr':'rd'}">${profit>=0?'+':''}${Math.round(profit).toLocaleString()}<br><span class="badge ${profit>=0?'gr':'rd'}">${roi.toFixed(2)}%</span></td>
      <td><div class="btn-group"><button class="btn sm" onclick="openEditModal('tw', ${idx})">改</button><button class="btn danger sm" onclick="deleteAsset('tw', ${idx})">刪</button></div></td>
    </tr>`;
  });
  document.getElementById('table-tw').innerHTML = htmlTw || '<tr><td colspan="6" style="text-align:center;color:var(--tx2)">尚無台股資產</td></tr>';

  // 2. 美股
  var htmlUs = '';
  H.us.forEach(function(item, idx) {
    var price = LP['us:' + item.sym.toUpperCase().trim()] || 0;
    var cost = parseFloat(item.cost) || 0;
    var qty = parseFloat(item.qty) || 0;
    var valueTwd = qty * price * C.FX;
    var itemCostTwd = qty * cost * C.FX;
    var profitTwd = valueTwd - itemCostTwd;
    var roi = itemCostTwd ? (profitTwd / itemCostTwd * 100) : 0;

    t_us_cost += itemCostTwd;
    t_us_val += valueTwd;

    htmlUs += `<tr>
      <td><div class="sym-title">${item.sym.toUpperCase()}</div><div class="sym-name">${item.nm || '-'}</div></td>
      <td>${qty}</td>
      <td>${price ? '$ ' + price.toFixed(2) : '<span style="color:var(--tx3)">讀取中...</span>'}</td>
      <td class="text-right">NT$ ${Math.round(valueTwd).toLocaleString()}</td>
      <td class="text-right ${profitTwd>=0?'gr':'rd'}">${profitTwd>=0?'+':''}${Math.round(profitTwd).toLocaleString()}<br><span class="badge ${profitTwd>=0?'gr':'rd'}">${roi.toFixed(2)}%</span></td>
      <td><div class="btn-group"><button class="btn sm" onclick="openEditModal('us', ${idx})">改</button><button class="btn danger sm" onclick="deleteAsset('us', ${idx})">刪</button></div></td>
    </tr>`;
  });
  document.getElementById('table-us').innerHTML = htmlUs || '<tr><td colspan="6" style="text-align:center;color:var(--tx2)">尚無美股資產</td></tr>';

  // 3. 虛擬貨幣
  var htmlCrypto = '';
  H.crypto.forEach(function(item, idx) {
    var price = LP['crypto:' + item.sym.toUpperCase().trim()] || 0;
    var cost = parseFloat(item.cost) || 0;
    var qty = parseFloat(item.qty) || 0;
    var valueTwd = qty * price * C.FX;
    var itemCostTwd = qty * cost * C.FX;
    var profitTwd = valueTwd - itemCostTwd;
    var roi = itemCostTwd ? (profitTwd / itemCostTwd * 100) : 0;

    t_cp_cost += itemCostTwd;
    t_cp_val += valueTwd;

    htmlCrypto += `<tr>
      <td><div class="sym-title">${item.sym.toUpperCase()}</div><div class="sym-name">${item.nm || '-'}</div></td>
      <td>${qty}</td>
      <td>${price ? '$ ' + (price>=1 ? price.toFixed(2) : price.toFixed(4)) : '<span style="color:var(--tx3)">內網阻擋</span>'}</td>
      <td class="text-right">NT$ ${Math.round(valueTwd).toLocaleString()}</td>
      <td class="text-right ${profitTwd>=0?'gr':'rd'}">${profitTwd>=0?'+':''}${Math.round(profitTwd).toLocaleString()}<br><span class="badge ${profitTwd>=0?'gr':'rd'}">${roi.toFixed(2)}%</span></td>
      <td><div class="btn-group"><button class="btn sm" onclick="openEditModal('crypto', ${idx})">改</button><button class="btn danger sm" onclick="deleteAsset('crypto', ${idx})">刪</button></div></td>
    </tr>`;
  });
  document.getElementById('table-crypto').innerHTML = htmlCrypto || '<tr><td colspan="6" style="text-align:center;color:var(--tx2)">尚無虛擬貨幣</td></tr>';

  // 總計
  var grandTotalVal = t_tw_val + t_us_val + t_cp_val;
  var grandTotalCost = t_tw_cost + t_us_cost + t_cp_cost;
  var grandProfit = grandTotalVal - grandTotalCost;
  var grandRoi = grandTotalCost ? (grandProfit / grandTotalCost * 100) : 0;

  document.getElementById('all-total').innerText = 'NT$ ' + Math.round(grandTotalVal).toLocaleString();
  document.getElementById('all-cost').innerText = 'NT$ ' + Math.round(grandTotalCost).toLocaleString();
  
  var roiEl = document.getElementById('all-roi');
  roiEl.innerText = (grandProfit >= 0 ? '+' : '') + grandRoi.toFixed(2) + '%';
  roiEl.className = grandProfit >= 0 ? 'gr' : 'rd';

  document.getElementById('tw-total').innerText = 'NT$ ' + Math.round(t_tw_val).toLocaleString();
  document.getElementById('us-total').innerText = 'NT$ ' + Math.round(t_us_val).toLocaleString();
  document.getElementById('crypto-total').innerText = 'NT$ ' + Math.round(t_cp_val).toLocaleString();

  renderChart(t_tw_val, t_us_val, t_cp_val);
}

function renderChart(tw, us, crypto) {
  var canvas = document.getElementById('pieChart');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  if(chartInstance) chartInstance.destroy();
  if(!tw && !us && !crypto) return;

  chartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['台股', '美股', '虛擬貨幣'],
      datasets: [{
        data: [tw, us, crypto],
        backgroundColor: ['#ea4335', '#4b8bf4', '#fbbc05'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#e4e7f0', font: { size: 12 } } }
      }
    }
  });
}

function openAddModal(cat) {
  document.getElementById('modalTitle').innerText = "新增資產持倉";
  document.getElementById('form-cat').value = cat;
  document.getElementById('form-idx').value = "-1";
  document.getElementById('form-sym').value = "";
  document.getElementById('form-sym').disabled = false;
  document.getElementById('form-nm').value = "";
  document.getElementById('form-qty').value = "";
  document.getElementById('form-cost').value = "";
  document.getElementById('form-dt').value = new Date().toISOString().split('T')[0];
  
  if(cat==='tw') document.getElementById('lbl-sym').innerText = "台股純數字代號 (如: 2330 / 2646)";
  if(cat==='us') document.getElementById('lbl-sym').innerText = "美股大寫代號 (如: AAPL)";
  if(cat==='crypto') document.getElementById('lbl-sym').innerText = "虛擬貨幣大寫代號 (如: BTC)";

  document.getElementById('addModal').classList.add('on');
}

function openEditModal(cat, idx) {
  var item = H[cat][idx];
  document.getElementById('modalTitle').innerText = "修改持倉資料";
  document.getElementById('form-cat').value = cat;
  document.getElementById('form-idx').value = idx.toString();
  document.getElementById('form-sym').value = item.sym;
  document.getElementById('form-sym').disabled = true;
  document.getElementById('form-nm').value = item.nm || '';
  document.getElementById('form-qty').value = item.qty;
  document.getElementById('form-cost').value = item.cost;
  document.getElementById('form-dt').value = item.dt || '';

  document.getElementById('addModal').classList.add('on');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('on');
}

async function submitForm() {
  var cat = document.getElementById('form-cat').value;
  var idx = parseInt(document.getElementById('form-idx').value);
  var sym = document.getElementById('form-sym').value.trim();
  var nm = document.getElementById('form-nm').value.trim();
  var qty = document.getElementById('form-qty').value;
  var cost = document.getElementById('form-cost').value;
  var dt = document.getElementById('form-dt').value;

  if(!sym || !qty || !cost) { alert("請填寫所有必要欄位！"); return; }

  var rowData = { sym: sym, nm: nm, qty: qty, cost: cost, dt: dt };

  if(idx === -1) {
    H[cat].push(rowData);
  } else {
    H[cat][idx] = rowData;
  }

  closeModal();
  saveConfig();
  renderAll();
  await gistPush();
  await refreshData();
}

async function deleteAsset(cat, idx) {
  if(!confirm("確定要刪除該持倉資產嗎？")) return;
  H[cat].splice(idx, 1);
  saveConfig();
  renderAll();
  await gistPush();
}

function renderSettings() {
  document.getElementById('cfg-token').value = C.TOKEN;
  document.getElementById('cfg-gid').value = C.GID;
  document.getElementById('cfg-fkey').value = C.FKEY;
  document.getElementById('cfg-fx').value = C.FX;
}

async function saveSettings() {
  C.TOKEN = document.getElementById('cfg-token').value.trim();
  C.GID = document.getElementById('cfg-gid').value.trim();
  C.FKEY = document.getElementById('cfg-fkey').value.trim();
  C.FX = parseFloat(document.getElementById('cfg-fx').value) || 32.5;

  saveConfig();
  alert("設定已保存，正在重新同步雲端並刷新市場行情...");
  await gistPull(false);
  await refreshData();
}

function clearAllData() {
  if(!confirm("⚠️ 確定重置並清除所有本地快取資料嗎？")) return;
  H = { tw: [], us: [], crypto: [], lastUpdate: Date.now() };
  LP = {};
  saveConfig();
  renderAll();
  gistPush();
}

function switchTab(name) {
  TABS.forEach(function(t) {
    var p = document.getElementById('mp-' + t);
    var btn = document.getElementById('mtab-' + t);
    var bnav = document.getElementById('dnav-' + t);
    if(p) p.classList.toggle('on', t === name);
    if(btn) btn.classList.toggle('on', t === name);
    if(bnav) bnav.classList.toggle('on', t === name);
  });
  if(name === 'settings') renderSettings();
}

function updateSyncStatus(msg) {
  var el = document.getElementById('syncText');
  if(el) el.innerText = "狀態：" + msg;
}
</script>
</body>
